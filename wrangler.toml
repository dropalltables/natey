name = "viruus"
compatibility_date = "2024-01-01"

# Analytics Engine binding for pageview tracking
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "viruus_analytics"

# Enable observability (logs visible in CF dashboard)
[observability]
enabled = true

[observability.logs]
invocation_logs = true
head_sampling_rate = 1
