{{ define "extra_head" }}
<link rel="stylesheet" href="/card/css/embed.css">
{{ end }}

{{ define "main" }}
<div class="progressive-blur progressive-blur--left" aria-hidden="true">
  <div></div><div></div><div></div><div></div>
</div>
<div class="progressive-blur progressive-blur--right" aria-hidden="true">
  <div></div><div></div><div></div><div></div>
</div>
<div class="home-cards" id="homeCards">
  <div class="home-cards__text">
    {{- partial "process-emojis.html" .Content -}}
  </div>
  <div class="home-cards__card">
    {{- partial "card_embed.html" . -}}
  </div>
</div>
<style>
  .home-cards {
    display: flex;
    align-items: stretch;
    gap: 0;
    transition: gap 0.6s ease;
  }

  .progressive-blur {
    position: fixed;
    top: 0;
    bottom: 0;
    width: 72px;
    pointer-events: none;
    z-index: 9999;
  }

  .progressive-blur--left {
    left: max(0px, calc((100vw - 720px) / 2));
  }

  .progressive-blur--right {
    right: max(0px, calc((100vw - 720px) / 2));
  }

  .progressive-blur > div {
    position: absolute;
    inset: 0;
    -webkit-backdrop-filter: blur(var(--b));
    backdrop-filter: blur(var(--b));
  }

  .progressive-blur--left > div:nth-child(1) { --b: 1px;  -webkit-mask-image: linear-gradient(to right, black, transparent 100%); mask-image: linear-gradient(to right, black, transparent 100%); }
  .progressive-blur--left > div:nth-child(2) { --b: 3px;  -webkit-mask-image: linear-gradient(to right, black, transparent 70%);  mask-image: linear-gradient(to right, black, transparent 70%); }
  .progressive-blur--left > div:nth-child(3) { --b: 8px;  -webkit-mask-image: linear-gradient(to right, black, transparent 45%);  mask-image: linear-gradient(to right, black, transparent 45%); }
  .progressive-blur--left > div:nth-child(4) { --b: 16px; -webkit-mask-image: linear-gradient(to right, black, transparent 20%);  mask-image: linear-gradient(to right, black, transparent 20%); }

  .progressive-blur--right > div:nth-child(1) { --b: 1px;  -webkit-mask-image: linear-gradient(to left, black, transparent 100%); mask-image: linear-gradient(to left, black, transparent 100%); }
  .progressive-blur--right > div:nth-child(2) { --b: 3px;  -webkit-mask-image: linear-gradient(to left, black, transparent 70%);  mask-image: linear-gradient(to left, black, transparent 70%); }
  .progressive-blur--right > div:nth-child(3) { --b: 8px;  -webkit-mask-image: linear-gradient(to left, black, transparent 45%);  mask-image: linear-gradient(to left, black, transparent 45%); }
  .progressive-blur--right > div:nth-child(4) { --b: 16px; -webkit-mask-image: linear-gradient(to left, black, transparent 20%);  mask-image: linear-gradient(to left, black, transparent 20%); }
  .home-cards.has-card {
    gap: 2rem;
  }
  .home-cards__text {
    flex: 1 1 auto;
    min-width: 0;
    transition: flex 0.6s ease;
  }
  .home-cards.has-card .home-cards__text {
    flex: 0 1 360px;
  }
  .home-cards__card {
    flex: 0 0 0;
    opacity: 0;
    overflow: visible;
    min-width: 0;
    padding: 20px;
    transition: flex 0.6s ease, opacity 0.6s ease 0.2s;
  }
  .home-cards.has-card .home-cards__card {
    flex: 1 1 50%;
    min-width: 0;
    opacity: 1;
  }
  .home-cards.has-card li:has(.cards-trigger) {
    display: none;
  }
  @media (max-width: 720px) {
    .home-cards.has-card {
      flex-direction: column;
    }
    .home-cards.has-card .home-cards__card {
      max-width: none;
    }
  }
</style>
<script type="module">
  import { initEmbeddedCard } from '/card/init.js';

  const KONAMI = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
  const VIP_STORAGE_KEY = 'viruus-vip-badge';

  function initKonami() {
    let i = 0;
    document.addEventListener('keydown', function handler(e) {
      if (e.key === KONAMI[i]) {
        i++;
        if (i === KONAMI.length) {
          document.removeEventListener('keydown', handler);
          localStorage.setItem(VIP_STORAGE_KEY, '1');
          const badge = document.querySelector('[data-vip-badge]');
          const cardVisible = document.getElementById('homeCards')?.classList.contains('has-card');
          if (badge) {
            badge.classList.add('vip-badge--visible');
            if (cardVisible) badge.classList.add('vip-badge--stamp');
            badge.removeAttribute('aria-hidden');
          }
          window.posthog?.capture('membership_card_vip_unlocked');
        }
      } else {
        i = 0;
      }
    });
  }
  initKonami();

  function hasValidSavedCard() {
    try {
      const raw = localStorage.getItem('viruus-membership-card');
      if (!raw) return false;
      const saved = JSON.parse(raw);
      return saved?.exp && saved.exp >= new Date().toISOString().slice(0, 10);
    } catch {
      return false;
    }
  }

  function showCard(source) {
    const container = document.getElementById('homeCards');
    if (!container) return;
    container.classList.add('has-card');
    window.posthog?.capture('membership_card_revealed', { source: source || 'click' });
    const cardEmbed = document.getElementById('homeCardEmbed');
    if (cardEmbed && !cardEmbed.dataset.initialized) {
      cardEmbed.dataset.initialized = 'true';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => initEmbeddedCard(cardEmbed));
      });
    }
  }

  if (hasValidSavedCard()) {
    showCard('saved');
  }

  document.querySelector('.cards-trigger')?.addEventListener('click', function(e) {
    e.preventDefault();
    showCard('click');
  });
</script>
{{ end }}
