<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor ID - Interactive</title>
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap">
</head>
<body>
  <div class="card-wrapper" id="cardWrapper">
    <div class="card-container" id="cardContainer">
      <div class="card-bg"></div>

      <div class="title">&asymp;Visitor ID&asymp;</div>

      <div class="info-section">
        <div class="background-bars">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>

        <div class="info-content">
          <div class="info-labels">ID#<br/>TIMEZONE<br/>EXP. DATE<br/>CREW ID<br/>CALLSIGN<br/>RANK<br/>OS<br/>RATING<br/></div>
          <div class="info-values" id="infoValues"></div>
        </div>
      </div>

      <div class="name-section">
        <div class="name-row">
          <div class="name-display" id="nameDisplay"></div>
          <div class="dither-placeholder">
            <canvas class="dither-canvas" id="ditherCanvas" width="150" height="150"></canvas>
          </div>
        </div>
        <div class="organization" id="organization"></div>
      </div>

      <div class="signature-box"></div>

      <div class="footer-text">Identification card is unusable until signed with a valid signature.</div>
    </div>

    <div class="name-input-wrapper" id="nameInputWrapper">
      <input type="text" class="name-input" id="firstNameInput" placeholder="first" maxlength="8" autocomplete="off" spellcheck="false">
      <input type="text" class="name-input" id="lastNameInput" placeholder="last" maxlength="8" autocomplete="off" spellcheck="false">
    </div>

    <div class="signature-overlay" id="signatureOverlay">
      <canvas id="signatureOverlayCanvas" width="2400" height="3600"></canvas>
    </div>

  </div>

  <div class="hint-text" id="hintText">press <code>ENTER</code> to complete</div>

  <script type="module">
    import { buildCardData } from './js/data.js';
    import { createAnimatedDitheringPattern } from './js/dither.js';
    import { SignatureController } from './js/signature.js';
    import { initTilt } from './js/tilt.js';
    import { initScale } from './js/scale.js';

    initScale();

    const data = buildCardData();

    document.getElementById('infoValues').innerHTML =
      `${data.id}<br/>${data.timezone}<br/>${data.exp}<br/>${data.crewId}<br/>${data.callsign}<br/>${data.rank}<br/>${data.os}<br/>${data.rating}`;

    document.getElementById('organization').textContent = data.organization;

    const cardWrapper = document.getElementById('cardWrapper');
    const cardContainer = document.getElementById('cardContainer');
    const firstNameInput = document.getElementById('firstNameInput');
    const lastNameInput = document.getElementById('lastNameInput');
    const nameInputWrapper = document.getElementById('nameInputWrapper');
    const nameDisplay = document.getElementById('nameDisplay');

    const tilt = initTilt(cardWrapper, cardContainer);

    let nameFinalized = false;
    let signatureFinalized = false;

    function checkComplete() {
      if (nameFinalized && signatureFinalized) {
        tilt.enable();
      }
    }

    const hintText = document.getElementById('hintText');

    const sig = new SignatureController(
      document.getElementById('signatureOverlay'),
      cardWrapper,
      document.getElementById('ditherCanvas'),
      { createAnimatedDitheringPattern },
      () => {
        signatureFinalized = true;
        finalizeName();
        hintText.classList.remove('visible');
        checkComplete();
      },
      tilt
    );

    sig.startDither();

    function finalizeName() {
      if (nameFinalized) return;
      const first = firstNameInput.value.trim() || 'Jane';
      const last = lastNameInput.value.trim() || 'Doe';
      nameDisplay.innerHTML = `${first}<br/>${last}`;
      nameDisplay.classList.add('finalized');
      nameInputWrapper.classList.add('finalized');
      nameFinalized = true;
      checkComplete();
    }

    firstNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') lastNameInput.focus();
    });

    lastNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') finalizeName();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && sig.hasDrawn && !sig.isSigned) {
        sig.complete();
      }
    });
  </script>
</body>
</html>
